<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Campaign Archive · Adolf de Guzman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; font-family: 'Inter', sans-serif; }
        .dashboard { padding: 40px 20px; }
        .month-card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s;
        }
        .month-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .campaign-table { background: white; border-radius: 20px; overflow: hidden; }
        .badge-sms { background: #28a745; color: white; padding: 3px 10px; border-radius: 40px; font-size: 0.8rem; }
        .badge-email { background: #0b1a2e; color: white; padding: 3px 10px; border-radius: 40px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="container">
            <h1 class="mb-4">📧 Email Campaign Archive</h1>
            <div id="app">Loading campaign data...</div>
        </div>
    </div>

    <script>
    async function loadCampaigns() {
        try {
            const indexRes = await fetch('data/campaigns.json');
            const index = await indexRes.json();
            
            let html = `<div class="row">`;
            
            for (const month of index.months) {
                const monthRes = await fetch(`data/${month.file}`);
                const monthData = await monthRes.json();
                
                html += `
                    <div class="col-md-6 mb-4">
                        <div class="month-card" onclick="location.href='#${month.slug}'">
                            <h3>${monthData.month.name}</h3>
                            <div class="d-flex gap-3 mb-3">
                                <span>📧 ${monthData.summary.revenue.total}</span>
                                <span>📱 ${monthData.summary.audience.email.total}</span>
                            </div>
                            <div>Campaigns: ${month.campaignCount}</div>
                        </div>
                    </div>
                `;
            }
            
            html += `</div>`;
            document.getElementById('app').innerHTML = html;
            
        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('app').innerHTML = 'Error loading campaign data';
        }
    }
    
    loadCampaigns();
    </script>
</body>
</html>
